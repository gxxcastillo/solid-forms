name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.10.0'

      - name: Enable corepack
        run: corepack enable

      - name: Install pnpm
        run: corepack prepare pnpm@9.7.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install moon
        run: pnpm exec moon --version || pnpm add -g @moonrepo/cli

      - name: Type check
        run: pnpm moon :types

      - name: Lint
        run: pnpm moon :lint

      - name: Test
        run: pnpm moon :test

      - name: Coverage
        run: pnpm moon :coverage

      - name: Build
        run: pnpm moon :build

      - name: Verify pack
        run: |
          cd packages/solid-forms
          pnpm pack
          node -e "
            const {execSync} = require('child_process');
            const files = execSync('tar -tzf gxxc-solid-forms-*.tgz', {encoding:'utf8'});
            const p = JSON.parse(execSync('tar -xOf gxxc-solid-forms-*.tgz package/package.json', {encoding:'utf8'}));
            if (p.dependencies && Object.keys(p.dependencies).length)
              throw new Error('unexpected dependencies: ' + JSON.stringify(p.dependencies));
            if (JSON.stringify(p.exports).includes('development'))
              throw new Error('development export condition found in packed tarball');
            if (!files.includes('package/dist/index.js'))
              throw new Error('dist/index.js missing from tarball');
            if (!files.includes('package/dist/index.d.ts'))
              throw new Error('dist/index.d.ts missing from tarball');
            console.log('pack ok');
          "
          rm gxxc-solid-forms-*.tgz
