$schema: 'https://moonrepo.dev/schemas/project.json'

language: 'typescript'

workspace:
  inheritedTasks:
    exclude:
      - 'build'

tasks:
  dev:
    command: 'pnpm dev'

  start:
    command: 'pnpm start'

  build:
    command: 'node'
    args:
      - '--eval'
      - "console.log('basic-demo build retired; use docs:build')"
    options:
      mergeArgs: 'replace'
